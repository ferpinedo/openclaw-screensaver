<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Activity Screen</title>
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #0d233e;
      --ink: #dff6ff;
      --muted: #8eb9d6;
      --accent: #66e3ff;
      --busy: #ffd166;
      --pulse: 0;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #17345a 0%, var(--bg2) 35%, var(--bg1) 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    body.busy {
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 209, 102, 0.18) 0%, transparent 30%),
        radial-gradient(circle at 80% 35%, rgba(255, 209, 102, 0.12) 0%, transparent 28%),
        radial-gradient(circle at 50% 50%, #1b2c45 0%, #0b1423 68%, #050a12 100%);
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 28px;
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0.92;
    }

    .brand .title {
      font-size: clamp(28px, 3vw, 56px);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brand .subtitle, .meta {
      color: var(--muted);
      font-size: clamp(12px, 1vw, 18px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .status-wrap {
      align-self: start;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #7fffd4;
      box-shadow: 0 0 16px #7fffd4;
      animation: breathe 2.4s ease-in-out infinite;
    }

    body.busy .dot {
      background: var(--busy);
      box-shadow: 0 0 18px var(--busy), 0 0 42px rgba(255, 209, 102, 0.5);
      animation: alert 0.8s ease-in-out infinite;
    }

    .status {
      font-size: clamp(14px, 1.2vw, 20px);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bottomline {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    .event-box {
      max-width: min(48vw, 720px);
      padding: 16px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(3, 12, 22, 0.45);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    }

    .event-label {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .event-text {
      font-size: clamp(18px, 2vw, 34px);
      line-height: 1.2;
      font-weight: 700;
      text-wrap: balance;
    }

    .clock {
      text-align: right;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 24px rgba(102,227,255,0.12);
    }

    .clock .time {
      font-size: clamp(40px, 6vw, 100px);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.04em;
    }

    .clock .date {
      margin-top: 10px;
      color: var(--muted);
      font-size: clamp(14px, 1.2vw, 20px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @keyframes breathe {
      0%,100% { transform: scale(0.88); opacity: 0.72; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes alert {
      0%,100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.35); opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="hud">
    <div class="topline">
      <div class="brand">
        <div class="title">OpenClaw</div>
        <div class="subtitle">activity screen</div>
      </div>
      <div class="status-wrap">
        <div class="dot"></div>
        <div class="status" id="statusText">idle</div>
      </div>
    </div>

    <div class="bottomline">
      <div class="event-box">
        <div class="event-label">último evento</div>
        <div class="event-text" id="eventText">Esperando actividad…</div>
      </div>

      <div class="clock">
        <div class="time" id="timeText">--:--</div>
        <div class="date" id="dateText">----</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');
    const eventText = document.getElementById('eventText');
    const timeText = document.getElementById('timeText');
    const dateText = document.getElementById('dateText');

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    let cx = w / 2;
    let cy = h / 2;

    const state = {
      mode: 'idle',
      source: 'system',
      message: 'Esperando actividad…',
      lastEventAt: null,
      busyUntil: 0,
      particles: []
    };

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      cx = w / 2;
      cy = h / 2;
    }
    window.addEventListener('resize', resize);

    function makeParticles(count = 140) {
      state.particles = Array.from({ length: count }, (_, i) => ({
        angle: (Math.PI * 2 * i) / count,
        radius: 90 + Math.random() * Math.min(w, h) * 0.34,
        speed: 0.0008 + Math.random() * 0.0018,
        size: 1 + Math.random() * 3,
        drift: Math.random() * 2000,
      }));
    }
    makeParticles();

    function setState(payload) {
      const now = Date.now();
      const kind = payload.kind || 'message';
      const duration = Number(payload.duration_ms || 15000);
      state.mode = 'busy';
      state.source = payload.source || (kind === 'cron' ? 'cron' : 'channel');
      state.message = payload.message || (kind === 'cron' ? 'Cron ejecutado' : 'Mensaje recibido');
      state.lastEventAt = now;
      state.busyUntil = now + duration;
      eventText.textContent = state.message;
      statusText.textContent = `${kind} / trabajando`;
      document.body.classList.add('busy');
    }

    function normalizeIdle() {
      if (Date.now() > state.busyUntil) {
        state.mode = 'idle';
        statusText.textContent = 'idle';
        document.body.classList.remove('busy');
      }
    }

    async function poll() {
      try {
        const res = await fetch('/state', { cache: 'no-store' });
        if (!res.ok) throw new Error('state fetch failed');
        const data = await res.json();
        if (data.last_event_ts && data.last_event_ts !== state.lastEventAt) {
          setState(data);
          state.lastEventAt = data.last_event_ts;
        }
      } catch (err) {
        // ignore transient errors
      }
    }
    setInterval(poll, 1500);
    poll();

    function updateClock() {
      const now = new Date();
      timeText.textContent = now.toLocaleTimeString('es-MX', {
        hour: '2-digit', minute: '2-digit'
      });
      dateText.textContent = now.toLocaleDateString('es-MX', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function drawOrbitalField(t) {
      ctx.clearRect(0, 0, w, h);
      const busy = state.mode === 'busy';
      const rings = busy ? 7 : 4;
      const base = Math.min(w, h) * (busy ? 0.1 : 0.12);

      for (let i = 0; i < rings; i++) {
        const r = base + i * (busy ? 36 : 52) + Math.sin(t * 0.001 + i) * (busy ? 14 : 8);
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = busy
          ? `rgba(255, 209, 102, ${0.08 + i * 0.02})`
          : `rgba(102, 227, 255, ${0.05 + i * 0.02})`;
        ctx.lineWidth = busy ? 2.5 : 1.2;
        ctx.stroke();
      }

      const coreR = base * (busy ? 0.78 : 0.92) + Math.sin(t * 0.002) * (busy ? 18 : 10);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 2.2);
      if (busy) {
        grad.addColorStop(0, 'rgba(255, 209, 102, 0.95)');
        grad.addColorStop(0.4, 'rgba(255, 174, 66, 0.22)');
        grad.addColorStop(1, 'rgba(255, 174, 66, 0)');
      } else {
        grad.addColorStop(0, 'rgba(102, 227, 255, 0.75)');
        grad.addColorStop(0.45, 'rgba(102, 227, 255, 0.18)');
        grad.addColorStop(1, 'rgba(102, 227, 255, 0)');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, coreR * 2.2, 0, Math.PI * 2);
      ctx.fill();

      for (const p of state.particles) {
        const a = p.angle + t * p.speed * (busy ? 3.5 : 1.2) + Math.sin((t + p.drift) * 0.001) * 0.08;
        const wave = Math.sin((t + p.drift) * 0.002) * (busy ? 32 : 12);
        const x = cx + Math.cos(a) * (p.radius + wave);
        const y = cy + Math.sin(a) * (p.radius + wave);
        ctx.beginPath();
        ctx.arc(x, y, busy ? p.size * 1.3 : p.size, 0, Math.PI * 2);
        ctx.fillStyle = busy
          ? 'rgba(255, 220, 140, 0.85)'
          : 'rgba(180, 240, 255, 0.62)';
        ctx.fill();
      }

      if (busy) {
        for (let i = 0; i < 5; i++) {
          const sweep = ((t * 0.004) + i * 0.9) % (Math.PI * 2);
          ctx.beginPath();
          ctx.arc(cx, cy, base + 90 + i * 24, sweep, sweep + 0.7);
          ctx.strokeStyle = `rgba(255, 209, 102, ${0.25 - i * 0.03})`;
          ctx.lineWidth = 4 - i * 0.4;
          ctx.stroke();
        }
      }
    }

    function loop(t) {
      normalizeIdle();
      drawOrbitalField(t);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
